name: Generate Sport Videos (EN)

on:
  workflow_dispatch:   # nur manuell auslösbar — Schedule deaktiviert

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          pip install yt-dlp --upgrade

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore article history (avoid repeats)
        uses: actions/cache@v4
        with:
          path: output/used_articles.json
          key: used-articles-en-${{ github.run_number }}
          restore-keys: |
            used-articles-en-

      - name: Ensure output directory exists
        run: mkdir -p output

      - name: Generate and queue videos
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
          ZERNIO_TIKTOK_ACCOUNT_ID: ${{ secrets.ZERNIO_TIKTOK_ACCOUNT_ID }}
          ZERNIO_YOUTUBE_ACCOUNT_ID: ${{ secrets.ZERNIO_YOUTUBE_ACCOUNT_ID }}
          ZERNIO_INSTAGRAM_ACCOUNT_ID: ${{ secrets.ZERNIO_INSTAGRAM_ACCOUNT_ID }}
          ZERNIO_YT_SPORT_ACCOUNT_ID: ${{ secrets.ZERNIO_YT_SPORT_ACCOUNT_ID }}
          BUNNY_STORAGE_PASSWORD: ${{ secrets.BUNNY_STORAGE_PASSWORD }}
          BUNNY_STORAGE_NAME: ${{ secrets.BUNNY_STORAGE_NAME }}
          BUNNY_CDN_URL: ${{ secrets.BUNNY_CDN_URL }}
          BUNNY_STORAGE_HOSTNAME: ${{ secrets.BUNNY_STORAGE_HOSTNAME }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 run_local.py "" 3 1
